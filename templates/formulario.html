<h2>Prueba de Ruta</h2>

<form action="/generar" method="POST">

    <div class="campo">
        <label for="km">Kilómetros:</label>
        <input type="text" id="km" name="km">
    </div>

    <table border="1" width="100%" cellspacing="0" cellpadding="5">
        <thead>
            <tr style="background-color:#d9d9d9;">
                <th>Elemento</th>
                <th>Estado</th>
                <th>OK</th>
                <th>NOK</th>
                <th>Solución</th>
            </tr>
        </thead>

        <tbody>

            <tr style="background-color:#bfbfbf;">
                <td colspan="5"><strong>1. ILUMINACIÓN</strong></td>
            </tr>

            <tr>
                <td>Exterior</td>
                <td>Funcionamiento</td>
                <td><input type="radio" name="exterior" value="OK"></td>
                <td><input type="radio" name="exterior" value="NOK"></td>
                <td><input type="text" name="solucion_exterior"></td>
            </tr>

            <tr>
                <td>Interior / Tapasol / Guantera</td>
                <td>Funcionamiento</td>
                <td><input type="radio" name="interior" value="OK"></td>
                <td><input type="radio" name="interior" value="NOK"></td>
                <td><input type="text" name="solucion_interior"></td>
            </tr>

            <tr style="background-color:#bfbfbf;">
                <td colspan="5"><strong>2. INTERIOR</strong></td>
            </tr>

            <tr>
                <td>Claxon, Sunroof</td>
                <td>Funcionamiento</td>
                <td><input type="radio" name="claxon" value="OK"></td>
                <td><input type="radio" name="claxon" value="NOK"></td>
                <td><input type="text" name="solucion_claxon"></td>
            </tr>

        </tbody>
    </table>

    <br>

    <button type="submit">
        Generar y Descargar PDF
    </button>

</form>
